name: Build and push container

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cuda12
            dockerfile: Dockerfile
            platforms: linux/amd64
            flavor: cuda12
          - name: cpu
            dockerfile: Dockerfile.cpu
            platforms: linux/amd64
            flavor: cpu
          - name: arm64
            dockerfile: Dockerfile.arm64
            platforms: linux/arm64
            flavor: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        if: github.event_name != 'pull_request'
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          tags="${image}:${{ matrix.flavor }}"

          if [[ "${GITHUB_REF}" == refs/heads/master || "${GITHUB_REF}" == refs/heads/main ]]; then
            tags="${tags},${image}:${{ matrix.flavor }}-${GITHUB_SHA::7}"
            if [[ "${{ matrix.flavor }}" == "cuda12" ]]; then
              tags="${tags},${image}:latest"
            fi
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
            tags="${tags},${image}:${version}-${{ matrix.flavor }}"
            if [[ "${{ matrix.flavor }}" == "cuda12" ]]; then
              tags="${tags},${image}:${version},${image}:latest"
            fi
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: runtime
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.flavor }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavor }}
          provenance: false
